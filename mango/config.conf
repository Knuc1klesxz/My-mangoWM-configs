# ══════════════════════════════════════════════
# CONFIGURAÇÃO DO MANGO - COMPOSITOR WAYLAND
# ══════════════════════════════════════════════

# ─────────────────────────────────────────────
# EFEITOS VISUAIS
# ─────────────────────────────────────────────

# Desfoque (desativado)
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

# Sombras (desativadas)
shadows=0
layer_shadows=0
shadow_only_floating=1
shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000ff

# Bordas e opacidade
border_radius=2
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# ─────────────────────────────────────────────
# ANIMAÇÕES
# ─────────────────────────────────────────────

animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8

# Durações (em ms)
animation_duration_move=500
animation_duration_open=850
animation_duration_tag=700
animation_duration_close=850
animation_duration_focus=0

# Curvas de animação (cubic-bezier)
animation_curve_open=0.22,1.3,0.36,1
animation_curve_move=0.22,1.3,0.36,1
animation_curve_tag=0.22,1.0,0.36,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.22,1.0,0.36,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.22,1.3,0.36,1

# ─────────────────────────────────────────────
# INICIALIZAÇÃO AUTOMÁTICA
# ─────────────────────────────────────────────

exec=dbus-update-activation-environment --all
exec=mako
exec=waybar
exec=swaybg -i $HOME/Imagens/wallpapers/banheira.png -m fill

# ─────────────────────────────────────────────
# LAYOUT SCROLLER
# ─────────────────────────────────────────────

scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# ─────────────────────────────────────────────
# LAYOUT MASTER-STACK
# ─────────────────────────────────────────────

new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# ─────────────────────────────────────────────
# VISÃO GERAL (OVERVIEW)
# ─────────────────────────────────────────────

hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# ─────────────────────────────────────────────
# COMPORTAMENTO GERAL
# ─────────────────────────────────────────────

no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1
monitor=eDP-1,1366x768@60,0x0,1

# ─────────────────────────────────────────────
# TECLADO
# ─────────────────────────────────────────────

repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=br
xkb_rules_variant=abnt2

# ─────────────────────────────────────────────
# TOUCHPAD
# ─────────────────────────────────────────────

disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# ─────────────────────────────────────────────
# MOUSE
# ─────────────────────────────────────────────

mouse_natural_scrolling=0

# ─────────────────────────────────────────────
# APARÊNCIA
# ─────────────────────────────────────────────

# Espaçamentos internos e externos
gappih=5
gappiv=5
gappoh=10
gappov=10

# Scratchpad
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

# Bordas e cores
borderpx=2
rootcolor=0x201b14ff
bordercolor=0x666666ff
dropcolor=0x8FBA7C55
focuscolor=0xffffffff
maximizescreencolor=0xffffffff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# ─────────────────────────────────────────────
# TAGS E LAYOUTS
# ─────────────────────────────────────────────

tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:scroller
tagrule=id:6,layout_name:scroller
tagrule=id:7,layout_name:scroller
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller

# ─────────────────────────────────────────────
# ATALHOS DE TECLADO (SUPER = tecla Windows)
# ─────────────────────────────────────────────

# Sistema
bind=SUPER,r,reload_config
bind=SUPER+SHIFT,e,quit
bind=SUPER,q,killclient,

# Lançadores
bind=SUPER,d,spawn,rofi -show drun
bind=SUPER,Return,spawn,foot
bind=SUPER+SHIFT,Return,spawn,nemo
bind=SUPER+SHIFT,w,spawn,helium
bind=SUPER+SHIFT,d,spawn,flatpak run dev.vencord.Vesktop

# Capturas de tela
bind=NONE,Print,spawn,$HOME/.local/bin/screenshot.sh full
bind=Shift,Print,spawn,$HOME/.local/bin/screenshot.sh select

# Foco entre janelas
bind=SUPER,Tab,focusstack,next
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# Trocar posição de janelas
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# Alternadores
bind=SUPER,g,toggleglobal,
bind=SUPER,backslash,togglefloating,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,i,restore_minimized
bind=SUPER,z,toggle_scratchpad

# Layout e proporções
bind=SUPER,e,set_proportion,1.0
bind=SUPER,x,switch_proportion_preset,
bind=SUPER,n,switch_layout

# Papéis de parede
bind=SUPER,w,spawn,~/.config/rofi/wallpaper-picker.sh $HOME/Imagens/wallpapers

# ─────────────────────────────────────────────
# NAVEGAÇÃO ENTRE TAGS (1–9)
# ─────────────────────────────────────────────

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Mover janela para tag
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# ─────────────────────────────────────────────
# MONITOR
# ─────────────────────────────────────────────

bind=SUPER+CTRL,Left,focusmon,left
bind=SUPER+CTRL,Right,focusmon,right

# ─────────────────────────────────────────────
# ESPAÇAMENTOS E REDIMENSIONAMENTO
# ─────────────────────────────────────────────

bind=SUPER+ALT,x,incgaps,1
bind=SUPER+ALT,z,incgaps,-1
bind=SUPER+ALT,r,togglegaps

# Mover janela flutuante
bind=SUPER+SHIFT+CTRL,Up,movewin,+0,-50
bind=SUPER+SHIFT+CTRL,Down,movewin,+0,+50
bind=SUPER+SHIFT+CTRL,Left,movewin,-50,+0
bind=SUPER+SHIFT+CTRL,Right,movewin,+50,+0

# Redimensionar janela flutuante
bind=SUPER+ALT+SHIFT,Up,resizewin,+0,-50
bind=SUPER+ALT+SHIFT,Down,resizewin,+0,+50
bind=SUPER+ALT+SHIFT,Left,resizewin,-50,+0
bind=SUPER+ALT+SHIFT,Right,resizewin,+50,+0

# ─────────────────────────────────────────────
# MOUSE
# ─────────────────────────────────────────────

mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# ─────────────────────────────────────────────
# AXIS (SCROLL COM TECLAS)
# ─────────────────────────────────────────────

axisbind=SUPER+SHIFT,UP,viewtoleft_have_client
axisbind=SUPER+SHIFT,DOWN,viewtoright_have_client

# ─────────────────────────────────────────────
# REGRAS DE CAMADAS
# ─────────────────────────────────────────────

layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
